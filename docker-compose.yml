services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    privileged: true
    volumes:
      - .:/workspace
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - minic-data:/var/lib/minic
    working_dir: /workspace
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    tmpfs:
      - /tmp
    stdin_open: true
    tty: true

volumes:
  minic-data:
